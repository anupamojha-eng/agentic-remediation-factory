[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "vulnerable-demo"
version = "0.1.0"
requires-python = ">=3.8"
# GHSA-8q59-q68h-6hv4: PyYAML < 6.0, arbitrary code execution
# GHSA-j8r2-6x86-q33q: requests < 2.31.0, credentials leaked on redirect
dependencies = [
    "PyYAML==5.3.1",
    "requests==2.27.0",
    "urllib3==1.24.1",
]
